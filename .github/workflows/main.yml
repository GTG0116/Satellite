name: Update Satellite Data

on:
  repository_dispatch:
    types: [satellite_update] # This is the event type cron-job.org will send
  workflow_dispatch:      # Keeps the manual trigger from GitHub UI
  # schedule:
  #   - cron: '0 * * * *'  # Commented out so it relies purely on cron-job.org

permissions:
  contents: write  # Needed to force-push the gh-pages deployment branch

jobs:
  update-satellite:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libproj-dev proj-data proj-bin libgeos-dev

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Generate Satellite Images
        run: python process_data.py

      - name: Deploy to GitHub Pages (force-push, no history accumulation)
        run: |
          git config user.name  "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Copy the generated site out of the working tree before switching branches
          DEPLOY_DIR=$(mktemp -d)
          cp -r site/. "$DEPLOY_DIR/"

          # Create a fresh orphan state — no parent commits, so history never grows.
          # Force-pushing this to gh-pages replaces the previous single commit,
          # keeping the branch at exactly one commit regardless of how many times
          # the workflow runs.
          git checkout --orphan gh-pages-deploy
          git rm -rf . --quiet

          cp -r "$DEPLOY_DIR/." .
          git add .
          git commit -m "deploy: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push --force origin HEAD:gh-pages
